
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎵 황시현 PLAY LIST 🎵</title>

<style>

:root{
  --bg:#0b0d12;
  --card:#171a22;
  --card-hover:#202532;
  --text:#ffffff;
  --sub:#8e97a8;
  --line:#2c3240;
  --accent:#8b6cff;
  --gradient-start:#b79cff;
  --gradient-end:#5a35ff;
  --tag-bg:#232734;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding:18px 14px 40px;
}

.container{
  max-width:720px;
  margin:0 auto;
}

.header{
  text-align:center;
  margin:10px 0 28px;
}

.header h1{
  font-size:30px;
  font-weight:900;
  letter-spacing:-0.7px;

  background:linear-gradient(
    135deg,
    var(--gradient-start),
    var(--gradient-end)
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  filter:drop-shadow(
    0 3px 10px rgba(123,92,255,.35)
  );
}

.header::after{
  content:'';
  display:block;

  width:68px;
  height:4px;

  margin:14px auto 0;

  border-radius:999px;

  background:linear-gradient(
    90deg,
    var(--gradient-start),
    var(--gradient-end)
  );
}

.search-box{
  margin-bottom:18px;
}

.search-box input{
  width:100%;

  background:var(--card);
  border:1px solid var(--line);

  color:var(--text);

  padding:16px 18px;

  border-radius:20px;

  font-size:14px;

  outline:none;

  transition:.2s;
}

.search-box input:focus{
  border-color:var(--accent);

  box-shadow:
    0 0 0 4px rgba(123,92,255,.15);
}

.playlist{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.song-item{
  background:var(--card);

  border:1px solid var(--line);

  border-radius:18px;

  padding:14px 16px;

  transition:.18s ease;
}

.song-item:hover{
  background:var(--card-hover);

  border-color:var(--accent);

  transform:translateY(-2px);
}

.artist{
  font-size:11px;

  font-weight:700;

  color:var(--sub);

  margin-bottom:8px;

  letter-spacing:.4px;
}

.songs-container{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
}

.song-tag{
  background:var(--tag-bg);

  color:var(--text);

  font-size:13px;

  font-weight:700;

  padding:7px 11px;

  border-radius:10px;

  line-height:1.4;

  border:1px solid rgba(255,255,255,.03);
}

.single-song .song-tag{
  background:transparent;

  border:none;

  padding:0;

  font-size:15px;
}

.empty{
  display:none;

  text-align:center;

  color:var(--sub);

  padding:60px 20px;
}

.footer{
  margin-top:34px;

  text-align:center;

  font-size:11px;

  color:#6d7483;
}

@media (max-width:480px){

  body{
    padding:16px 12px 36px;
  }

  .header h1{
    font-size:24px;
  }

  .song-item{
    padding:13px 14px;
    border-radius:16px;
  }

  .artist{
    font-size:10px;
  }

  .song-tag{
    font-size:12px;
    padding:6px 10px;
  }

  .single-song .song-tag{
    font-size:14px;
  }

}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>🎵 황시현 PLAY LIST 🎵</h1>
  </div>

  <div class="search-box">
    <input
      type="text"
      id="searchInput"
      placeholder="가수 또는 노래 제목 검색"
      oninput="filterSongs()"
    />
  </div>

  <div class="playlist" id="playlist"></div>

  <div class="empty" id="empty">
    검색 결과가 없습니다 🥲
  </div>

  <div class="footer">
    Made by Hwang Si Hyun
  </div>

</div>

<script>

const playlistData = [

  { artist:"구윤회", songs:"Marry Me" },
  { artist:"길구봉구", songs:"이별" },
  { artist:"김건모", songs:"서울의 달 / 미안해요 / 청첩장" },
  { artist:"김광석(故)", songs:"서른즈음에" },
  { artist:"김기태", songs:"비연" },
  { artist:"김동률", songs:"감사 / 기억의 습작" },
  { artist:"김범수", songs:"끝사랑" },
  { artist:"김성규", songs:"널 떠올리면" }

  // 여기에 계속 추가

];

const playlist = document.getElementById("playlist");
const empty = document.getElementById("empty");

function render(data){

  playlist.innerHTML = "";

  if(data.length === 0){

    empty.style.display = "block";
    return;

  }

  empty.style.display = "none";

  data.forEach(item => {

    const div = document.createElement("div");

    div.className = "song-item";

    const songList = item.songs
      .split("/")
      .map(song => song.trim());

    if(songList.length === 1){
      div.classList.add("single-song");
    }

    const tagsHTML = songList.map(song =>
      `<span class="song-tag">${song}</span>`
    ).join("");

    div.innerHTML = `
      <div class="artist">${item.artist}</div>

      <div class="songs-container">
        ${tagsHTML}
      </div>
    `;

    playlist.appendChild(div);

  });

}

function filterSongs(){

  const keyword = document
    .getElementById("searchInput")
    .value
    .toLowerCase();

  const filtered = playlistData.filter(item =>

    item.artist.toLowerCase().includes(keyword) ||

    item.songs.toLowerCase().includes(keyword)

  );

  render(filtered);

}

render(playlistData);

</script>

</body>
</html>
