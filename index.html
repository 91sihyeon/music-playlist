<meta charset="UTF-8" />

<title>🎵 황시현 Playlist</title>

<style>
:root{
    --bg:#f5f7fb;
    --card:#ffffff;
    --text:#111827;
    --sub:#6b7280;
    --line:#e5e7eb;
    --accent:#6366f1;
}

body.dark{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
    --sub:#94a3b8;
    --line:#334155;
    --accent:#818cf8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    transition:.3s;
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px 16px 60px;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

h1{
    font-size:28px;
    font-weight:800;
}

.theme-btn{
    border:none;
    background:var(--card);
    border:1px solid var(--line);
    color:var(--text);
    padding:10px 14px;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
}

.search{
    margin-bottom:22px;
}

.search input{
    width:100%;
    padding:16px;
    border-radius:14px;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--text);
    font-size:16px;
    outline:none;
}

.section{
    margin-bottom:26px;
}

.section-title{
    font-size:22px;
    font-weight:800;
    margin-bottom:14px;
    color:var(--accent);
}

.song{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:16px;
    margin-bottom:12px;
    transition:.2s;
}

.song:hover{
    transform:translateY(-2px);
}

.artist{
    font-size:18px;
    font-weight:700;
    margin-bottom:8px;
}

.track-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.track{
    background:rgba(99,102,241,.1);
    color:var(--text);
    padding:8px 12px;
    border-radius:999px;
    font-size:14px;
}

.empty{
    text-align:center;
    padding:50px 20px;
    color:var(--sub);
    display:none;
}
</style>
</head>

<body>

<div class="container">

    <div class="top">
        <h1>🎵 황시현 Playlist</h1>

        <button class="theme-btn" onclick="toggleDark()">
            🌙 다크모드
        </button>
    </div>

    <div class="search">
        <input type="text" id="searchInput" placeholder="가수 또는 노래 검색..." oninput="renderPlaylist()">
    </div>

    <div id="playlist"></div>

function renderPlaylist(){
    const keyword=document.getElementById("searchInput").value.toLowerCase();
    const wrap=document.getElementById("playlist");
    const empty=document.getElementById("empty");

    wrap.innerHTML="";
    let found=false;

    for(const section in playlistData){

        let sectionHTML="";

        playlistData[section].forEach(item=>{

            const artistMatch=item.artist.toLowerCase().includes(keyword);

            const filteredSongs=item.songs.filter(song =>
                song.toLowerCase().includes(keyword)
            );

            if(artistMatch || filteredSongs.length>0){

                found=true;

                const showSongs=artistMatch ? item.songs : filteredSongs;

                sectionHTML+=`
                <div class="song">
                    <div class="artist">${item.artist}</div>

                    <div class="track-list">
                        ${showSongs.map(song=>`
                            <div class="track">${song}</div>
                        `).join("")}
                    </div>
                </div>
                `;
            }
        });

        if(sectionHTML){
            wrap.innerHTML+=`
            <div class="section">
                <div class="section-title">［ ${section} ］</div>
                ${sectionHTML}
            </div>
            `;
        }
    }

    empty.style.display=found ? "none" : "block";
}

function toggleDark(){
    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){
        localStorage.setItem("theme","dark");
    }else{
        localStorage.setItem("theme","light");
    }
}

window.onload=()=>{
    if(localStorage.getItem("theme")==="dark"){
        document.body.classList.add("dark");
    }

    renderPlaylist();
}
