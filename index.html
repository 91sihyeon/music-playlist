<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎵 황시현 PLAY LIST 🎵</title>

<style>

/* 방송 화면 환경에 최적화된 묵직하고 선명한 다크 모드 */
:root[data-theme="dark"] {
  --bg:#090b0e;
  --card:#14171f;
  --card-hover:#1e222e;
  --text:#ffffff;
  --sub:#9fa8b7;
  --line:#262c3a;
  --accent:#9d82ff;
  --gradient-start:#c3b0ff;
  --gradient-end:#6e4aff;
  --tag-bg:#222735;
}

/* 화사하고 깨끗한 라이트 모드 */
:root[data-theme="light"] {
  --bg:#f4f6fa;
  --card:#ffffff;
  --card-hover:#ebedf3;
  --text:#1e2229;
  --sub:#656e7b;
  --line:#dce1e9;
  --accent:#633eff;
  --gradient-start:#8b6cff;
  --gradient-end:#4a23eb;
  --tag-bg:#e8ebf2;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding:18px 14px 40px;
  transition: background 0.3s ease, color 0.3s ease;
}

.container{
  max-width:720px;
  margin:0 auto;
  position: relative;
}

/* 상단 화면 모드 선택 컨트롤 */
.top-controls {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 5px;
}

.theme-toggle-btn {
  background: var(--card);
  border: 1px solid var(--line);
  color: var(--text);
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  transition: 0.2s ease;
}

.theme-toggle-btn:hover {
  background: var(--card-hover);
  border-color: var(--accent);
}

.header{
  text-align:center;
  margin:10px 0 28px;
}

.header h1{
  font-size:30px;
  font-weight:900;
  letter-spacing:-0.7px;

  background:linear-gradient(
    135deg,
    var(--gradient-start),
    var(--gradient-end)
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  filter:drop-shadow(
    0 3px 10px rgba(123,92,255,.25)
  );
}

.header::after{
  content:'';
  display:block;

  width:68px;
  height:4px;

  margin:14px auto 0;

  border-radius:999px;

  background:linear-gradient(
    90deg,
    var(--gradient-start),
    var(--gradient-end)
  );
}

.search-box{
  margin-bottom:18px;
}

.search-box input{
  width:100%;

  background:var(--card);
  border:1px solid var(--line);

  color:var(--text);

  padding:16px 18px;

  border-radius:12px;

  font-size:14px;

  outline:none;

  transition:.2s;
}

.search-box input:focus{
  border-color:var(--accent);

  box-shadow:
    0 0 0 4px rgba(123,92,255,.15);
}

.playlist{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.song-item{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px 16px;
  transition:.18s ease, background 0.3s ease, border-color 0.3s ease;
}

.song-item:hover{
  background:var(--card-hover);
  border-color:var(--accent);
  transform:translateY(-2px);
}

.artist{
  font-size:11px;
  font-weight:700;
  color:var(--sub);
  margin-bottom:8px;
  letter-spacing:.4px;
}

.songs-container{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  width:100%;
}

.song-tag{
  background:var(--tag-bg);
  color:var(--text);
  font-size:13px;
  font-weight:700;
  padding:7px 11px;
  border-radius:6px;
  line-height:1.4;
  border:1px solid rgba(255,255,255,.03);
  word-break: break-all; 
  display: inline-block;
  transition: background 0.3s ease, color 0.3s ease;
}

.empty{
  display:none;
  text-align:center;
  color:var(--sub);
  padding:60px 20px;
}

.footer{
  margin-top:34px;
  text-align:center;
  font-size:11px;
  color:#6d7483;
}

@media (max-width:480px){

  body{
    padding:16px 12px 36px;
  }

  .header h1{
    font-size:24px;
  }

  .search-box input{
    border-radius:10px;
  }

  .song-item{
    padding:13px 14px;
    border-radius:10px;
  }

  .artist{
    font-size:10px;
  }

  .song-tag{
    font-size:12px;
    padding:6px 10px;
    border-radius:5px;
  }

}

</style>
</head>

<body>

<div class="container">

  <div class="empty" id="empty">

  <div class="footer">
    Made by Hwang Si Hyun

</div>

function toggleTheme() {
  const currentTheme = document.documentElement.getAttribute('data-theme');
  const btn = document.getElementById('themeToggleBtn');
  
  if (currentTheme === 'light') {
    document.documentElement.setAttribute('data-theme', 'dark');
    btn.innerHTML = '☀️ 라이트 모드'; // 다크모드가 되면 '라이트모드로 바꾸는 버튼' 표시

  { artist: "SG워너비", songs: "Timeless / STAY / 다른 사랑 만나도 / 광 / 사랑하길 정말 잘했어요 / 살다가" },
  { artist: "Spapa(에스파파)", songs: "참 다행이다" },
  { artist: "V.O.S(브이오에스)", songs: "부디" },
  { artist: "V.One(브이원)", songs: "그런가봐요 / 면도 " },
  { artist: "WOODZ(우즈)", songs: "AMNESIA" }
];

const playlist = document.getElementById("playlist");
const empty = document.getElementById("empty");

function render(data){
  playlist.innerHTML = "";

  if(data.length === 0){
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "song-item";

    const songList = item.songs
      .split("/")
      .map(song => song.trim());

    const tagsHTML = songList.map(song =>
      `<span class="song-tag">${song}</span>`
    ).join("");

    div.innerHTML = `
      <div class="artist">${item.artist}</div>
      <div class="songs-container">
        ${tagsHTML}
      </div>
    `;

    playlist.appendChild(div);
  });
}

function filterSongs(){
  const keyword = document
    .getElementById("searchInput")
    .value
    .toLowerCase();

  const filtered = playlistData.filter(item =>
    item.artist.toLowerCase().includes(keyword) ||
    item.songs.toLowerCase().includes(keyword)
  );

  render(filtered);
}

render(playlistData);

</script>
