<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎵 황시현 PLAY LIST 🎵</title>

<style>
/* 🍦 감성적인 파스텔 톤 웜톤 라이트 모드 */
:root[data-theme="light"] {
  --bg: #f7f4eb;
  --card: #ffffff;
  --card-hover: #f1ede2;
  --text: #241f1c;
  --sub: #70655e;
  --line: #e8e2d5;
  --accent: #2e4468;
  --gradient-start: #6a6270; /* 묵직하고 차분한 제목 색 */
  --gradient-end: #8a7f92;
  
  /* 🎨 [변경됨] 주파수 움직임: 파스텔 피치 & 소프트 라벤더 그라데이션 */
  --eq-start: #ffb7b2;         /* 파스텔 피치 핑크 */
  --eq-end: #d1b3ff;          /* 파스텔 소프트 라벤더 */
  
  --tag-bg: #f1ede2;
  --tag-text: #4a3f38;
  --shadow: rgba(36, 31, 28, 0.05);
  --neon: rgba(255, 183, 178, 0.3); /* 파스텔톤의 부드러운 광원 */
  --disc-opacity: 0.4;         /* 파형 기본 투명도를 살짝 높여 더 잘 보이게 수정 */
}

/* 🍫 묵직하고 따뜻한 다크 모드 */
:root[data-theme="dark"] {
  --bg: #141211;
  --card: #1e1b19;
  --card-hover: #292422;
  --text: #f5f0eb;
  --sub: #9c8e85;
  --line: #2d2825;
  --accent: #b8c9e5;
  --gradient-start: #88808c;
  --gradient-end: #a8a0b0;
  
  /* 다크모드 주파수 */
  --eq-start: #a18cd1;         
  --eq-end: #fbc2eb;
  
  --tag-bg: #292422;
  --tag-text: #e0d7cf;
  --shadow: rgba(0, 0, 0, 0.5);
  --neon: rgba(161, 140, 209, 0.2);
  --disc-opacity: 0.25;
}

/* (이하 기존 CSS 구조와 동일하므로 주요 수정된 부분인 Wave 관련 부분만 발췌) */

.card-wave span {
  display: block;
  width: 3px;
  background: var(--eq-start); /* 👈 기본색을 파스텔 톤으로 설정 */
  opacity: var(--disc-opacity);
  border-radius: 2px;
  transition: 0.3s ease;
}

.song-item:hover .card-wave span, .song-item:active .card-wave span {
  background: linear-gradient(to top, var(--eq-start), var(--eq-end));
  opacity: 1;
  animation: waveBeat 0.6s infinite alternate;
  box-shadow: 0 0 6px var(--eq-start); /* 👈 파스텔 빛이 은은하게 퍼지도록 수정 */
}

/* ... (기타 하단 동일) */
</style>
