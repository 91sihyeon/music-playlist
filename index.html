<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎵 황시현 PLAY LIST 🎵</title>

<style>
:root{
  --bg:#0f1115;
  --card:#181b22;
  --card-hover:#222733;
  --text:#ffffff;
  --sub:#9aa5b5;
  --line:#2b313d;
  --accent:#7c5cff;
  --gradient-start:#a388ff;
  --gradient-end:#5831f7;
  --tag-bg:#22252e;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  padding:20px 14px 40px;
}

.container{
  max-width:700px;
  margin:0 auto;
}

.header{
  text-align:center;
  margin:15px 0 30px;
  padding-bottom:15px;
  position:relative;
}

.header h1{
  font-size:30px;
  font-weight:900;
  letter-spacing:-0.5px;
  background:linear-gradient(135deg,var(--gradient-start),var(--gradient-end));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  filter:drop-shadow(0px 2px 8px rgba(124,92,255,0.3));
  display:inline-block;
}

.header::after{
  content:'';
  display:block;
  width:60px;
  height:4px;
  background:linear-gradient(90deg,var(--gradient-start),var(--gradient-end));
  border-radius:2px;
  margin:12px auto 0;
  box-shadow:0 2px 10px rgba(124,92,255,0.5);
}

.search-box{
  margin-bottom:20px;
}

.search-box input{
  width:100%;
  background:var(--card);
  border:1px solid var(--line);
  color:var(--text);
  padding:15px 18px;
  border-radius:16px;
  font-size:15px;
  outline:none;
  transition:0.2s;
}

.search-box input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(124,92,255,0.15);
}

.playlist{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.song-item{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px 18px;
  transition:0.2s;
}

.song-item:hover{
  background:var(--card-hover);
  border-color:var(--accent);
  transform:translateY(-1px);
}

.artist{
  font-size:12px;
  font-weight:600;
  color:var(--sub);
  margin-bottom:8px;
  letter-spacing:0.3px;
}

.songs-container{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.song-tag{
  background:var(--tag-bg);
  color:var(--text);
  font-size:14px;
  font-weight:700;
  padding:7px 12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.03);
  line-height:1.4;
}

.single-song .song-tag{
  background:transparent;
  padding:0;
  border:none;
  font-size:15px;
}

.empty{
  text-align:center;
  padding:50px 20px;
  color:var(--sub);
  display:none;
}

.footer{
  margin-top:40px;
  text-align:center;
  color:#707784;
  font-size:12px;
}

@media (max-width:480px){
  .header h1{
    font-size:24px;
  }

  .song-item{
    padding:15px;
  }

  .artist{
    font-size:11px;
  }

  .song-tag{
    font-size:13px;
    padding:6px 10px;
  }

  .single-song .song-tag{
    font-size:14px;
  }
}
</style>
</head>

<body>

  <div class="header">
    <h1>🎵 황시현 PLAY LIST 🎵</h1>
  </div>

  <div class="search-box">
    <input
      type="text"
      id="searchInput"
      placeholder="가수 또는 노래 제목 검색"
      oninput="filterSongs()"
    />
  </div>

  <div class="playlist" id="playlist"></div>

  <div class="empty" id="empty">
    검색 결과가 없습니다 🥲
  </div>

  <div class="footer">
    Made by Hwang Si Hyun

</div>

const playlist = document.getElementById("playlist");
const empty = document.getElementById("empty");

function render(data){
  playlist.innerHTML = "";

  if(data.length === 0){
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";

  data.forEach(item => {

    const div = document.createElement("div");
    div.className = "song-item";

    const songList = item.songs
      .split("/")
      .map(song => song.trim());

    if(songList.length === 1){
      div.classList.add("single-song");
    }

    const tagsHTML = songList.map(song =>
      `<span class="song-tag">${song}</span>`
    ).join("");

    div.innerHTML = `
      <div class="artist">${item.artist}</div>
      <div class="songs-container">
        ${tagsHTML}
      </div>
    `;

    playlist.appendChild(div);

  });
}

function filterSongs(){

  const keyword = document
    .getElementById("searchInput")
    .value
    .toLowerCase();

  const filtered = playlistData.filter(item =>
    item.artist.toLowerCase().includes(keyword) ||
    item.songs.toLowerCase().includes(keyword)
  );

  render(filtered);
}

render(playlistData);
